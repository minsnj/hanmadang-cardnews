name: "한마당 스토리 포스팅"

on:
  workflow_dispatch:
    inputs:
      link_url:
        description: "포스트 링크 URL"
        required: true

jobs:
  post-story:
    runs-on: ubuntu-latest
    steps:
      - name: "Instagram 스토리 포스팅 디버그"
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          LINK_URL: ${{ github.event.inputs.link_url }}
        run: |
          python3 - << 'EOF'
          import urllib.request, urllib.parse, urllib.error, json, time, os

          TOKEN    = os.environ["INSTAGRAM_ACCESS_TOKEN"]
          USER_ID  = os.environ["INSTAGRAM_USER_ID"]
          LINK_URL = os.environ["LINK_URL"]
          IMAGE_URL = "https://github.com/minsnj/hanmadang-cardnews/releases/download/hamadang-apps-v1/story.png"

          def ig_post(path, data):
              url  = f"https://graph.instagram.com/v21.0{path}"
              data["access_token"] = TOKEN
              body = urllib.parse.urlencode(data).encode()
              req  = urllib.request.Request(url, data=body, method="POST")
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read())
              except urllib.error.HTTPError as e:
                  print(f"POST error ({e.code}): {e.read().decode()}")
                  raise

          # 1. Token scopes via Facebook debug_token
          print("=== Token debug ===")
          try:
              qs = urllib.parse.urlencode({"input_token": TOKEN, "access_token": TOKEN})
              req2 = urllib.request.Request(f"https://graph.facebook.com/v21.0/debug_token?{qs}")
              with urllib.request.urlopen(req2) as r:
                  debug = json.loads(r.read())
              print(f"Scopes: {debug.get('data',{}).get('scopes', [])}")
          except Exception as e:
              print(f"Token debug failed: {e}")

          # 2. Shorten instagram URL
          short_url = LINK_URL
          if "instagram.com" in LINK_URL:
              try:
                  api = f"https://tinyurl.com/api-create.php?url={urllib.parse.quote(LINK_URL)}"
                  with urllib.request.urlopen(api, timeout=10) as r:
                      short_url = r.read().decode().strip()
                  print(f"Short URL: {short_url}")
              except Exception as e:
                  print(f"Shorten failed: {e}")

          print(f"Link sticker URL: {short_url}")

          # 3. Create container with url
          res = ig_post(f"/{USER_ID}/media", {
              "image_url":  IMAGE_URL,
              "media_type": "STORIES",
              "url":        short_url,
          })
          container_id = res["id"]
          print(f"Container ID: {container_id}")

          # 4. Publish
          time.sleep(3)
          result = ig_post(f"/{USER_ID}/media_publish", {"creation_id": container_id})
          print(f"Published ID: {result['id']}")
          EOF
