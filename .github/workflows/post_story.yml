name: "한마당 스토리 포스팅"

on:
  workflow_dispatch:
    inputs:
      link_url:
        description: "포스트 링크 URL"
        required: true

jobs:
  post-story:
    runs-on: ubuntu-latest
    steps:
      - name: "Instagram 스토리 포스팅"
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          LINK_URL: ${{ github.event.inputs.link_url }}
        run: |
          python3 - << 'EOF'
          import urllib.request, urllib.parse, urllib.error, json, time, os

          TOKEN    = os.environ["INSTAGRAM_ACCESS_TOKEN"]
          USER_ID  = os.environ["INSTAGRAM_USER_ID"]
          LINK_URL = os.environ["LINK_URL"]
          IMAGE_URL = "https://github.com/minsnj/hanmadang-cardnews/releases/download/hamadang-apps-v1/story.png"

          def api_post(base, path, data):
              url  = f"{base}/v21.0{path}"
              data["access_token"] = TOKEN
              body = urllib.parse.urlencode(data).encode()
              req  = urllib.request.Request(url, data=body, method="POST")
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read())
              except urllib.error.HTTPError as e:
                  print(f"POST error ({e.code}): {e.read().decode()}")
                  raise

          # Shorten instagram URL
          short_url = LINK_URL
          if "instagram.com" in LINK_URL:
              try:
                  api = f"https://tinyurl.com/api-create.php?url={urllib.parse.quote(LINK_URL)}"
                  with urllib.request.urlopen(api, timeout=10) as r:
                      short_url = r.read().decode().strip()
                  print(f"Short URL: {short_url}")
              except Exception as e:
                  print(f"Shorten failed: {e}")

          # Try 1: graph.instagram.com
          print("=== Try 1: graph.instagram.com ===")
          try:
              res = api_post("https://graph.instagram.com", f"/{USER_ID}/media", {
                  "image_url":  IMAGE_URL,
                  "media_type": "STORIES",
                  "url":        short_url,
              })
              cid = res["id"]
              print(f"Container: {cid}")
              time.sleep(3)
              result = api_post("https://graph.instagram.com", f"/{USER_ID}/media_publish", {"creation_id": cid})
              print(f"Published: {result['id']}")
          except Exception as e:
              print(f"Try 1 failed: {e}")

              # Try 2: graph.facebook.com
              print("=== Try 2: graph.facebook.com ===")
              try:
                  res2 = api_post("https://graph.facebook.com", f"/{USER_ID}/media", {
                      "image_url":  IMAGE_URL,
                      "media_type": "STORIES",
                      "url":        short_url,
                  })
                  cid2 = res2["id"]
                  print(f"Container: {cid2}")
                  time.sleep(3)
                  result2 = api_post("https://graph.facebook.com", f"/{USER_ID}/media_publish", {"creation_id": cid2})
                  print(f"Published: {result2['id']}")
              except Exception as e2:
                  print(f"Try 2 failed: {e2}")
          EOF
