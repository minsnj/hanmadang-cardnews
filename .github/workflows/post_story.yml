name: "한마당 스토리 포스팅"

on:
  workflow_dispatch:
    inputs:
      link_url:
        description: "포스트 링크 URL"
        required: true

jobs:
  post-story:
    runs-on: ubuntu-latest
    steps:
      - name: "Instagram 스토리 포스팅 (instagrapi)"
        env:
          INSTAGRAM_SESSION: ${{ secrets.INSTAGRAM_SESSION }}
          LINK_URL: ${{ github.event.inputs.link_url }}
        run: |
          pip install instagrapi pillow -q
          python3 - << 'EOF'
          import os, json, urllib.request
          from instagrapi import Client
          from instagrapi.types import StoryLink

          LINK_URL = os.environ["LINK_URL"]
          IMAGE_URL = "https://github.com/minsnj/hanmadang-cardnews/releases/download/hamadang-apps-v1/story.png"

          # 이미지 다운로드
          urllib.request.urlretrieve(IMAGE_URL, "/tmp/story.png")
          print("이미지 다운로드 완료")

          # 세션으로 로그인
          session = json.loads(os.environ["INSTAGRAM_SESSION"])
          cl = Client()
          cl.set_settings(session)
          cl.login(session["authorization_data"]["ds_user_id"], "")
          print(f"세션 로그인 완료")

          # 링크 스티커 포함 스토리 업로드
          media = cl.photo_upload_to_story(
              "/tmp/story.png",
              links=[StoryLink(webUri=LINK_URL)]
          )
          print(f"✅ 게시 완료! ID: {media.id}")
          EOF
