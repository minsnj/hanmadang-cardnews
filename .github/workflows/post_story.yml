name: "한마당 스토리 포스팅"

on:
  workflow_dispatch:
    inputs:
      link_url:
        description: "포스트 링크 URL"
        required: true

jobs:
  post-story:
    runs-on: ubuntu-latest
    steps:
      - name: "Instagram 스토리 포스팅"
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          LINK_URL: ${{ github.event.inputs.link_url }}
        run: |
          python3 - << 'EOF'
          import urllib.request, urllib.parse, urllib.error, json, time, os

          TOKEN    = os.environ["INSTAGRAM_ACCESS_TOKEN"]
          USER_ID  = os.environ["INSTAGRAM_USER_ID"]
          LINK_URL = os.environ["LINK_URL"]
          IMAGE_URL = "https://github.com/minsnj/hanmadang-cardnews/releases/download/hamadang-apps-v1/story.png"
          BASE = "https://graph.facebook.com/v21.0"

          def ig_get(path):
              sep = "&" if "?" in path else "?"
              url = f"{BASE}{path}{sep}access_token={TOKEN}"
              try:
                  with urllib.request.urlopen(url) as r:
                      return json.loads(r.read())
              except urllib.error.HTTPError as e:
                  print(f"GET error ({e.code}): {e.read().decode()}")
                  return {}

          def ig_post(path, data):
              url  = f"{BASE}{path}"
              data["access_token"] = TOKEN
              body = urllib.parse.urlencode(data).encode()
              req  = urllib.request.Request(url, data=body, method="POST")
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read())
              except urllib.error.HTTPError as e:
                  print(f"POST error ({e.code}): {e.read().decode()}")
                  raise

          # TinyURL로 단축
          short_url = LINK_URL
          if "instagram.com" in LINK_URL:
              try:
                  api = f"https://tinyurl.com/api-create.php?url={urllib.parse.quote(LINK_URL)}"
                  with urllib.request.urlopen(api, timeout=10) as r:
                      short_url = r.read().decode().strip()
                  print(f"단축 URL: {short_url}")
              except Exception as e:
                  print(f"단축 실패: {e}")

          # 컨테이너 생성
          res = ig_post(f"/{USER_ID}/media", {
              "image_url":  IMAGE_URL,
              "media_type": "STORIES",
              "url":        short_url,
          })
          container_id = res["id"]
          print(f"컨테이너 생성: {container_id}")

          # 컨테이너 상태 확인 (url 필드 포함)
          time.sleep(5)
          cf = ig_get(f"/{container_id}?fields=id,status_code,status")
          print(f"컨테이너 상태: {json.dumps(cf)}")

          # 게시
          result = ig_post(f"/{USER_ID}/media_publish", {"creation_id": container_id})
          print(f"✅ 게시 완료! ID: {result['id']}")

          # 게시된 미디어 확인
          time.sleep(3)
          media = ig_get(f"/{result['id']}?fields=id,media_type,timestamp,permalink")
          print(f"게시 미디어 정보: {json.dumps(media)}")
          EOF
