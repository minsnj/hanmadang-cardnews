name: 한마당 스토리 포스팅

on:
  workflow_dispatch:
    inputs:
      link_url:
        description: '포스트 링크 URL (인스타그램 포스트 주소)'
        required: true

jobs:
  post-story:
    runs-on: ubuntu-latest
    steps:
      - name: Instagram 스토리 포스팅
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          LINK_URL: ${{ github.event.inputs.link_url }}
        run: |
          python3 - << 'PYEOF'
          import urllib.request, urllib.parse, urllib.error, json, time, os

          TOKEN     = os.environ["INSTAGRAM_ACCESS_TOKEN"]
          USER_ID   = os.environ["INSTAGRAM_USER_ID"]
          LINK_URL  = os.environ["LINK_URL"]
          IMAGE_URL = "https://github.com/minsnj/hanmadang-cardnews/releases/download/hamadang-apps-v1/story.png"

          def ig_post(path, data):
              url  = f"https://graph.instagram.com/v21.0{path}"
              data["access_token"] = TOKEN
              body = urllib.parse.urlencode(data).encode()
              req  = urllib.request.Request(url, data=body, method="POST")
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read())
              except urllib.error.HTTPError as e:
                  print(f"API 오류 ({e.code}): {e.read().decode()}")
                  raise

          # instagram.com URL → TinyURL 단축 (링크 스티커가 외부 URL에만 작동)
          short_url = LINK_URL
          if "instagram.com" in LINK_URL:
              try:
                  tinyurl_api = f"https://tinyurl.com/api-create.php?url={urllib.parse.quote(LINK_URL)}"
                  with urllib.request.urlopen(tinyurl_api, timeout=10) as r:
                      short_url = r.read().decode().strip()
                  print(f"단축 URL: {short_url}")
              except Exception as e:
                  print(f"단축 실패, 원본 URL 사용: {e}")

          print(f"링크 스티커 URL: {short_url}")

          # 컨테이너 생성
          res = ig_post(f"/{USER_ID}/media", {
              "image_url":  IMAGE_URL,
              "media_type": "STORIES",
              "url":        short_url,
          })
          container_id = res["id"]
          print(f"컨테이너 ID: {container_id}")

          # 게시
          time.sleep(3)
          result = ig_post(f"/{USER_ID}/media_publish", {"creation_id": container_id})
          print(f"✅ 스토리 게시 완료! ID: {result['id']}")
          PYEOF
