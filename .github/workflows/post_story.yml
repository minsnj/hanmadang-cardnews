name: "한마당 스토리 포스팅"

on:
  workflow_dispatch:
    inputs:
      link_url:
        description: "포스트 링크 URL"
        required: true

jobs:
  post-story:
    runs-on: ubuntu-latest
    steps:
      - name: "Instagram 스토리 포스팅 (instagrapi)"
        env:
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
          INSTAGRAM_TOTP_SECRET: ${{ secrets.INSTAGRAM_TOTP_SECRET }}
          LINK_URL: ${{ github.event.inputs.link_url }}
        run: |
          pip install instagrapi pillow pyotp -q
          python3 - << 'EOF'
          import os, urllib.request
          from instagrapi import Client
          from instagrapi.types import StoryLink

          USERNAME = os.environ["INSTAGRAM_USERNAME"]
          PASSWORD = os.environ["INSTAGRAM_PASSWORD"]
          TOTP_SECRET = os.environ.get("INSTAGRAM_TOTP_SECRET", "")
          LINK_URL = os.environ["LINK_URL"]
          IMAGE_URL = "https://github.com/minsnj/hanmadang-cardnews/releases/download/hamadang-apps-v1/story.png"

          # 이미지 다운로드
          urllib.request.urlretrieve(IMAGE_URL, "/tmp/story.png")
          print("이미지 다운로드 완료")

          cl = Client()

          if TOTP_SECRET:
              import pyotp
              totp_code = pyotp.TOTP(TOTP_SECRET).now()
              cl.login(USERNAME, PASSWORD, verification_code=totp_code)
          else:
              cl.login(USERNAME, PASSWORD)

          print(f"로그인 완료: {USERNAME}")

          media = cl.photo_upload_to_story(
              "/tmp/story.png",
              links=[StoryLink(webUri=LINK_URL)]
          )
          print(f"✅ 게시 완료! ID: {media.id}")
          EOF
