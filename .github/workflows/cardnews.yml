name: 한마당 카드뉴스 자동 포스팅

on:
  # 게시는 크롤러(crawl.yml)가 시트 저장 직후 workflow_dispatch로 트리거(주 경로, ~MYT 07:05).
  # 아래 cron은 '백업'만: 크롤러 트리거 실패 시 늦게라도 잡아냄(그땐 posted_today로 건너뜀).
  # ⚠️ UTC 23:00(MYT 07:00) cron 제거함 — 크롤러 dispatch와 거의 동시에 떠서
  #    posted_history 커밋 전에 둘 다 게시되는 '중복 게시' race가 있었음(2026-06-28 수정).
  schedule:
    - cron: '0 1 * * *'    # UTC 01:00 = MYT 09:00 (백업)
    - cron: '0 3 * * *'    # UTC 03:00 = MYT 11:00 (백업)
  workflow_dispatch:

jobs:
  post-cardnews:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          sudo apt-get update && sudo apt-get install -y tesseract-ocr
          pip install anthropic playwright instagrapi pytesseract pillow
          python3 -m playwright install --with-deps chromium

      - name: .env 파일 생성
        run: |
          cat > .env << EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}
          GITHUB_REPOSITORY=${{ github.repository }}
          EOF
          echo "${{ secrets.INSTAGRAM_SESSION_B64 }}" | base64 -d > .ig_session.json

      - name: 카드뉴스 생성 및 포스팅
        run: python3 generate_cardnews.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: 게시 기록 커밋 (중복 방지용 posted_history.json)
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_history.json
          git diff --staged --quiet || (git commit -m "chore: 게시 기록 업데이트 [skip ci]" && git pull --rebase && git push)

      - name: 생성된 이미지 업로드 (아카이브)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cardnews-${{ github.run_id }}
          path: images/
          retention-days: 30
