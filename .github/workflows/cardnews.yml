name: 한마당 카드뉴스 자동 포스팅

on:
  # 여러 시각 cron + 하루1회 멱등성(posted_today) + 번역 가드 = 자가 치유.
  # 시트에 번역된 데이터가 준비된 첫 시각에 게시, 이미 올렸으면 건너뜀.
  # (Mac 잠자기로 크롤러가 늦게 돌아도 다음 cron이 잡아냄)
  # 크롤러도 저장 직후 workflow_dispatch로 트리거함(있으면 보너스).
  schedule:
    - cron: '0 23 * * *'   # UTC 23:00 = MYT 07:00
    - cron: '0 1 * * *'    # UTC 01:00 = MYT 09:00
    - cron: '0 3 * * *'    # UTC 03:00 = MYT 11:00
  workflow_dispatch:

jobs:
  post-cardnews:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          sudo apt-get update && sudo apt-get install -y tesseract-ocr
          pip install anthropic playwright instagrapi pytesseract pillow
          python3 -m playwright install --with-deps chromium

      - name: .env 파일 생성
        run: |
          cat > .env << EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}
          GITHUB_REPOSITORY=${{ github.repository }}
          EOF
          echo "${{ secrets.INSTAGRAM_SESSION_B64 }}" | base64 -d > .ig_session.json

      - name: 카드뉴스 생성 및 포스팅
        run: python3 generate_cardnews.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: 게시 기록 커밋 (중복 방지용 posted_history.json)
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_history.json
          git diff --staged --quiet || (git commit -m "chore: 게시 기록 업데이트 [skip ci]" && git pull --rebase && git push)

      - name: 생성된 이미지 업로드 (아카이브)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cardnews-${{ github.run_id }}
          path: images/
          retention-days: 30
