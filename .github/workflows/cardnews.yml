name: 한마당 카드뉴스 자동 포스팅

on:
  schedule:
    # UTC 22:37 = MYT 06:37 (크롤러 06:00 이후, 혼잡한 UTC 00:00 회피로 지연 최소화)
    - cron: '37 22 * * *'
  workflow_dispatch:

jobs:
  post-cardnews:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          pip install anthropic playwright instagrapi
          python3 -m playwright install --with-deps chromium

      - name: .env 파일 생성
        run: |
          cat > .env << EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}
          GITHUB_REPOSITORY=${{ github.repository }}
          EOF
          echo "${{ secrets.INSTAGRAM_SESSION_B64 }}" | base64 -d > .ig_session.json

      - name: 카드뉴스 생성 및 포스팅
        run: python3 generate_cardnews.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: 게시 기록 커밋 (중복 방지용 posted_history.json)
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_history.json
          git diff --staged --quiet || (git commit -m "chore: 게시 기록 업데이트 [skip ci]" && git pull --rebase && git push)

      - name: 생성된 이미지 업로드 (아카이브)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cardnews-${{ github.run_id }}
          path: images/
          retention-days: 30
