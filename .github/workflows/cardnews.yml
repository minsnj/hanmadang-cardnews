name: 한마당 카드뉴스 자동 포스팅

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  post-cardnews:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          pip install instagrapi pyotp anthropic playwright
          python3 -m playwright install --with-deps chromium

      - name: .env 파일 생성
        run: |
          cat > .env << EOF
          INSTAGRAM_USERNAME=${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD=${{ secrets.INSTAGRAM_PASSWORD }}
          INSTAGRAM_TOTP_SECRET=${{ secrets.INSTAGRAM_TOTP_SECRET }}
          EOF

      - name: 카드뉴스 생성 및 포스팅
        run: python3 generate_cardnews.py

      - name: 생성된 이미지 업로드 (아카이브)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cardnews-${{ github.run_id }}
          path: images/
          retention-days: 30
