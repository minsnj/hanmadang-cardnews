<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 540px; height: 960px;
  overflow: hidden;
  font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Nanum Gothic', sans-serif;
}

.story {
  position: relative;
  width: 540px; height: 960px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 50px 36px 46px;
}

/* ── 배경 ── */
.bg {
  position: absolute; inset: 0;
  background-image: url('exports/card_01.png');
  background-size: cover;
  background-position: center;
  filter: blur(20px) brightness(0.32) saturate(0.5);
  transform: scale(1.1);
}
.bg-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(
    180deg,
    rgba(0,0,0,0.30) 0%,
    rgba(0,0,0,0.00) 35%,
    rgba(0,0,0,0.00) 62%,
    rgba(0,0,0,0.50) 100%
  );
}

/* ── 상단: 계정명 + NEW POST ── */
.top {
  position: relative; z-index: 1;
  text-align: center;
}
.new-post {
  font-family: 'Bebas Neue', Impact, 'Arial Black', sans-serif;
  font-size: 7.4rem;
  line-height: 0.9;
  color: #fff;
  letter-spacing: 0.05em;
  text-shadow: 0 6px 30px rgba(0,0,0,0.55);
}

/* ── 중앙: 인스타그램 목업 ── */
.mockup {
  position: relative; z-index: 1;
  background: #fff;
  border-radius: 18px;
  width: 368px;
  box-shadow:
    0 20px 60px rgba(0,0,0,0.6),
    0 2px 10px rgba(0,0,0,0.35);
  overflow: hidden;
}
.mockup-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px 6px;
}
/* 왼쪽: 프로필 아바타 + 계정명 */
.mockup-profile {
  display: flex;
  align-items: center;
  gap: 8px;
}
.mockup-avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; color: #fff; font-weight: 800;
  flex-shrink: 0;
}
.mockup-username {
  font-size: 0.75rem;
  font-weight: 700;
  color: #262626;
  letter-spacing: -0.01em;
}
.mockup-dots {
  display: flex; gap: 3px; align-items: center;
}
.mockup-dots span {
  width: 4px; height: 4px;
  background: #262626;
  border-radius: 50%;
  display: block;
}

.mockup-img-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 1/1;
}
.mockup-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
/* 캐러셀 아이콘 */
.carousel-icon {
  position: absolute;
  top: 10px; right: 10px;
  width: 20px; height: 20px;
  opacity: 0.9;
}
.carousel-icon svg { width: 20px; height: 20px; }

.mockup-actions {
  display: flex;
  align-items: center;
  padding: 9px 14px 9px;
  gap: 12px;
}
.mockup-actions .action-left { display: flex; gap: 12px; align-items: center; }
.mockup-actions .bookmark { margin-left: auto; }
.mockup-actions svg { width: 22px; height: 22px; }

/* ── 하단: 워터마크 + CTA ── */
.bottom {
  position: relative; z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

/* 🍊한마당 워터마크 배지 */
.watermark {
  display: flex;
  align-items: center;
  gap: 7px;
  background: rgba(255,255,255,0.14);
  border: 1.5px solid rgba(255,255,255,0.35);
  backdrop-filter: blur(4px);
  border-radius: 99px;
  padding: 7px 20px 7px 16px;
}
.watermark-emoji { font-size: 1.15rem; line-height: 1; }
.watermark-text {
  font-size: 1rem;
  font-weight: 800;
  color: #fff;
  letter-spacing: 0.03em;
}
.watermark-divider {
  width: 1.5px; height: 14px;
  background: rgba(255,255,255,0.35);
  border-radius: 99px;
}
.watermark-sub {
  font-size: 0.8rem;
  font-weight: 500;
  color: rgba(255,255,255,0.7);
  letter-spacing: 0.02em;
}

/* CTA 텍스트 */
.cta {
  text-align: center;
}
.cta-line1 {
  font-size: 1.35rem;
  font-weight: 700;
  color: rgba(255,255,255,0.95);
  letter-spacing: -0.01em;
  line-height: 1.5;
  text-shadow: 0 2px 14px rgba(0,0,0,0.4);
  word-break: keep-all;
}
.cta-line2 {
  font-size: 1.35rem;
  font-weight: 700;
  color: rgba(255,255,255,0.95);
  letter-spacing: -0.01em;
  line-height: 1.5;
  text-shadow: 0 2px 14px rgba(0,0,0,0.4);
}
</style>
</head>
<body>
<div class="story">
  <div class="bg"></div>
  <div class="bg-overlay"></div>

  <!-- 상단 -->
  <div class="top">
    <div class="new-post">NEW POST</div>
  </div>

  <!-- 인스타그램 목업 -->
  <div class="mockup">
    <div class="mockup-header">
      <div class="mockup-profile">
        <div class="mockup-avatar">한</div>
        <span class="mockup-username">hanmadang_my</span>
      </div>
      <div class="mockup-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div class="mockup-img-wrap">
      <img class="mockup-img" src="exports/card_01.png" alt="카드뉴스">
      <div class="carousel-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="5" width="13" height="13" rx="2.5" fill="white" stroke="#262626" stroke-width="1.8"/>
          <rect x="9" y="2" width="13" height="13" rx="2.5" fill="white" stroke="#262626" stroke-width="1.8"/>
        </svg>
      </div>
    </div>

    <div class="mockup-actions">
      <div class="action-left">
        <svg viewBox="0 0 24 24" fill="#ed4956"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="#262626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="#262626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </div>
      <div class="bookmark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#262626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </div>
    </div>
  </div>

  <!-- 하단 -->
  <div class="bottom">
    <div class="watermark">
      <span class="watermark-emoji">🍊</span>
      <span class="watermark-text">한마당</span>
      <div class="watermark-divider"></div>
      <span class="watermark-sub">말레이시아 생활정보</span>
    </div>
    <div class="cta">
      <div class="cta-line1">구독 &amp; 좋아요 &amp; 알림설정은</div>
      <div class="cta-line2">저희에게 큰 힘이 됩니다 💪</div>
    </div>
  </div>
</div>
</body>
</html>
